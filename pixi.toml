[workspace]
authors = ["davidbonet <davidbonetsole@gmail.com>"]
channels = ["conda-forge", "pytorch", "nvidia", "huggingface"]
name = "ARGformer"
platforms = ["linux-64"]
version = "0.1.0"

[tasks]

[dependencies]
python = "3.11.9.*"
pip = "24.2.*"
pytorch = { version = "2.4.0.*", channel = "pytorch" }
pytorch-cuda = { version = "12.4.*", channel = "pytorch" }
torchvision = { version = "0.19.0.*", channel = "pytorch" }
torchaudio = { version = "2.4.0.*", channel = "pytorch" }
cuda-toolkit = "12.4.*"
c-compiler = "1.7.0.*"
cxx-compiler = "1.7.0.*"
datasets = "2.21.0.*"
huggingface_hub = "0.24.6.*"
tokenizers = "0.19.1.*"
transformers = "4.44.1.*"
omegaconf = "2.3.0.*"
pyyaml = "6.0.2.*"
einops = "0.8.0.*"
packaging = "24.1.*"
pandas = "2.2.2.*"
pyarrow = "17.0.0.*"
requests = "2.32.3.*"
tqdm = "4.66.5.*"
numpy = "1.26.4.*"
numba = "0.60.0.*"
llvmlite = "0.43.0.*"
psutil = "6.0.0.*"
tskit = "1.0.0.*"
torchmetrics = "1.4.0.post0.*"
torch-optimizer = "0.3.0.*"
pytorch-ranger = "0.1.1.*"
matplotlib = "3.9.2.*"
wandb = "0.16.6.*"
boto3 = "1.35.2.*"
google-cloud-storage = "2.10.0.*"
azure-storage-blob = "12.22.0.*"
azure-storage-file-datalake = "12.16.0.*"
oci = "2.132.0.*"
paramiko = "3.4.1.*"
python-snappy = "0.7.2.*"
xxhash = "0.8.2.*"
zstandard = "0.23.0.*"
pytest = "8.3.2.*"
pytest-xdist = "3.6.1.*"

[pypi-dependencies]
mosaicml = "==0.24.1"
mosaicml-cli = "==0.6.41"
mosaicml-streaming = "==0.8.0"
torch-optimi = "==0.2.1"
ninja = "==1.11.1.1"
ruamel-yaml = "==0.18.6"
ruamel-yaml-clib = "==0.2.8"

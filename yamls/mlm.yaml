# Run Name
run_name: pretraining_run_name

# Dataset
data_local: /path/to/arg/data/dataset_name/dataset_variant
max_seq_len: 128
data_remote: null

tokenizer_name: argformer
mlm_probability: 0.3

# Model
model:
  name: flex_bert
  recompute_metric_loss: false
  pretrained_model_name: bert-base-uncased
  tokenizer_name: ${tokenizer_name}
  model_config:
    dataset:
      local: ${data_local}
      split: val
    max_seq_len: ${max_seq_len}
    masking_option: default
    num_attention_heads: 12
    num_hidden_layers: 12
    attention_layer: rope
    attention_probs_dropout_prob: 0.0
    attn_out_bias: false
    attn_out_dropout_prob: 0.0
    attn_qkv_bias: false
    bert_layer: prenorm
    embed_dropout_prob: 0.0
    embed_norm: false
    final_norm: true
    embedding_layer: sans_pos
    loss_function: fa_cross_entropy
    loss_kwargs:
      reduction: mean
    mlp_dropout_prob: 0.0
    mlp_in_bias: false
    mlp_layer: mlp
    mlp_out_bias: false
    normalization: rmsnorm
    norm_kwargs:
      eps: 1e-6
    padding: unpadded
    sparse_prediction: false
    rotary_emb_dim: null
    rotary_emb_base: 10000.0
    rotary_emb_scale_base: null
    rotary_emb_interleaved: false
    hidden_act: gelu
    init_method: full_megatron
    init_std: 0.02
    init_cutoff_factor: 2.0
    init_small_embedding: False
    deterministic_fa2: false
    initial_attention_layer: null
    initial_bert_layer: null
    initial_mlp_layer: null
    num_initial_layers: 0
    skip_first_prenorm: true
    sliding_window: 128
    global_attn_every_n_layers: 3
    unpad_embeddings: true
    pad_logits: false

# Dataloaders
train_loader:
  name: arg
  dataset:
    local: ${data_local}
    remote: null
    split: train
    streaming: false
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: true
    mlm_probability: ${mlm_probability}
    skip_extant_tokens: true
  drop_last: true
  num_workers: 8

eval_loader:
  name: arg
  dataset:
    local: ${data_local}
    remote: null
    split: val
    streaming: false
    tokenizer_name: ${tokenizer_name}
    max_seq_len: ${max_seq_len}
    shuffle: false
    mlm_probability: 0.15
    skip_extant_tokens: true
  drop_last: false
  num_workers: 8

# Optimization
scheduler:
  name: linear_decay_with_warmup
  t_warmup: 0.06dur
  alpha_f: 0.02

optimizer:
  name: decoupled_adamw
  lr: 5.0e-4
  betas:
  - 0.9
  - 0.98
  eps: 1.0e-06
  weight_decay: 1.0e-5
  filter_bias_norm_wd: true

max_duration: 5ep
eval_interval: 500ba
eval_subset_num_batches: 10
global_train_batch_size: 512

# System
seed: 17
device_train_microbatch_size: 512
precision: amp_bf16

global_eval_batch_size: 512
device_eval_microbatch_size: 512

# Logging
progress_bar: false
log_to_console: true
console_log_interval: 100ba
python_log_level: "INFO"

algorithms:
  gradient_clipping:
    clipping_type: norm
    clipping_threshold: 1.0

callbacks:
  speed_monitor:
    window_size: 10
  lr_monitor: {}

loggers:
  wandb:
    project: ARGformer
    # entity: your_wandb_entity  # Uncomment and set your wandb entity name

save_interval: 500ba
save_num_checkpoints_to_keep: 1
save_folder: /path/to/checkpoints/${run_name}
load_path: /path/to/checkpoints/${run_name}/latest-rank0.pt
autoresume: true
save_overwrite: false
